$('gps').onclick = () => {
  if (!navigator.geolocation) {
    show('GPS非対応');
    return;
  }

  addrstat.textContent = '';if(!$('jusho').value){$('jusho').value = '';}addrstat.textContent = '取得中';
  show('GPS取得中...');

  navigator.geolocation.getCurrentPosition(
    p => {
      const lat = p.coords.latitude;
      const lng = p.coords.longitude;

      map.setView([lat, lng], 18);

      const m = L.marker([lat, lng], { draggable: true })
        .bindPopup('現在地')
        .openPopup();

      addToLayer(m);

      $('jusho').value = lat.toFixed(6)+','+lng.toFixed(6);
      addrstat.textContent = '✓';

      fetch(`https://mreversegeocoder.gsi.go.jp/reverse-geocoder/LonLatToAddress?lat=${lat}&lon=${lng}`)
        .then(r=>r.json())
        .then(d=>{
          if(d.results){
            if(d.results){const r=d.results;const addr=[r.prefecture||'',r.city||'',r.town||'',r.lv01Nm||''].join('');$('jusho').value=addr||(lat.toFixed(6)+','+lng.toFixed(6));}
          }
        })
        .catch(()=>{});

      show('GPS成功');
      dirty = true;
    },
    err => {
      addrstat.textContent = '×';
      show('GPS失敗: '+err.message);
    },
    {
      enableHighAccuracy: true,
      timeout: 20000,
      maximumAge: 0
    }
  );
};

on');delBtn.textContent = '✕';delBtn.style = 'width:36px;height:36px;border:none;border-radius:6px;background:#ef4444;color:#fff';delBtn.onclick = () => {if(confirm(item.name+' を削除する？')){localStorage.removeItem('denryoku_'+item.name);localStorage.removeItem('denryoku_'+item.name+'_map');row.remove();show('削除OK');}};row.appendChild(loadBtn);row.appendChild(date);row.appendChild(delBtn);listBody.appendChild(row);});listPanel.style.display = 'block';};
$('listClose').onclick = () => {listPanel.style.display = 'none';};
$('companyFilter').onchange = () => {$('list').click();};
$('searchInput').oninput = () => {$('list').click();};
if(!$('jusho').value){$('jusho').value = '宮城県';}upd();show('準備OK - v50.0');resizeMap();window.addEventListener('resize',()=>resizeMap());
let autoSaveTimer;document.addEventListener('input',()=>{clearTimeout(autoSaveTimer);autoSaveTimer=setTimeout(()=>{if(dirty && $('genba').value.trim()){$('save').click();}},10000);});
$('keiyaku').addEventListener('change',()=>{if($('keiyaku').value==='相談'){show('契約種別：電力会社と協議');}dirty=true;});
if(navigator.geolocation){navigator.geolocation.getCurrentPosition(p=>{map.setView([p.coords.latitude,p.coords.longitude],17);},e=>{console.log('GPS init失敗',e.message);});}
window.addEventListener('error',e=>{console.error('JSエラー:',e.message);});window.addEventListener('pagehide',()=>{if(dirty && $('genba').value.trim()){$('save').click();}});window.addEventListener('popstate',()=>{if(dirty){show('未保存データあり');history.pushState(null,null,location.href);}});})();</script></body></html>
